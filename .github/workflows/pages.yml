# Genera config.js en el deploy sin guardar claves en el repo.
# Configurá estos Secrets en GitHub → Settings → Secrets and variables → Actions:
#   SUPABASE_URL, SUPABASE_ANON_KEY, FAMILY_PIN

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets obligatorios
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FAMILY_PIN: ${{ secrets.FAMILY_PIN }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Falta el secret SUPABASE_URL en GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Falta el secret SUPABASE_ANON_KEY en GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$FAMILY_PIN" ]; then
            echo "::error::Falta el secret FAMILY_PIN en GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "Secrets OK"

      - name: Crear config.js e inyectar en index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FAMILY_PIN: ${{ secrets.FAMILY_PIN }}
        run: node scripts/inject-config.js

      - name: Verificar que la config quedó embebida
        run: |
          grep -q "window.SODERIA_CONFIG" index.html
          grep -q "SUPABASE_URL" index.html
          echo "Config embebida OK"

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar Pages
        id: deployment
        uses: actions/deploy-pages@v4
