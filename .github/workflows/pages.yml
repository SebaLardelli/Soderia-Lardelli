# Publica en GitHub Pages sin subir claves al repo.
# Secrets en Settings → Secrets and variables → Actions:
#   SUPABASE_URL, SUPABASE_ANON_KEY, FAMILY_PIN

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FAMILY_PIN: ${{ secrets.FAMILY_PIN }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Falta SUPABASE_URL en Secrets"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Falta SUPABASE_ANON_KEY en Secrets"
            exit 1
          fi
          if [ -z "$FAMILY_PIN" ]; then
            echo "::error::Falta FAMILY_PIN en Secrets"
            exit 1
          fi
          echo "Secrets OK"

      - name: Inyectar config en index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FAMILY_PIN: ${{ secrets.FAMILY_PIN }}
        run: node scripts/inject-config.js

      - name: Verificar config embebida
        run: |
          grep -q "window.SODERIA_CONFIG" index.html
          grep -q "SUPABASE_URL" index.html
          test -f config.js
          grep -q "SUPABASE_URL" config.js
          echo "Config embebida OK"

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar Pages
        id: deployment
        uses: actions/deploy-pages@v4
